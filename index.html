    <script>
        document.addEventListener("DOMContentLoaded", function() {
    // เลือกทุกลิงก์ที่อยู่ใน class parent
    const links = document.querySelectorAll(".parent a");
    const overlay = document.getElementById("jumpscare-overlay");

    links.forEach(link => {
        link.addEventListener("click", function(event) {
            // 1. ระงับการไปหน้าอื่นทันที
            event.preventDefault();
            
            // เก็บ URL ของหน้าที่จะไปไว้ในตัวแปร
            const targetUrl = this.href;

            // 2. แสดง Popup Jumpscare
            overlay.style.display = "flex";

            // 3. ตั้งเวลา (เช่น 1 วินาที) แล้วค่อยเปลี่ยนหน้า
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1000); // 1000 คือ 1 วินาที ปรับเพิ่มหรือลดความไวได้ที่นี่
        });
    });
});
    </script>
